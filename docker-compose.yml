version: '3.8'

services:
  gtm-deck-factory:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
      - "3001:3001"
    environment:
      NODE_ENV: development
      PORT: 3000
      MCP_PORT: 3001
      LOG_LEVEL: debug
      CANVA_API_KEY: ${CANVA_API_KEY}
      CANVA_API_BASE_URL: https://api.canva.com
    volumes:
      - ./src:/app/src
      - ./logs:/app/logs
    networks:
      - gtm-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

networks:
  gtm-network:
    driver: bridge
